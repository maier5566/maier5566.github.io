<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deu no Poste SP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#2a7a2a;font-family:Arial,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;padding-top:25px}
header{background:#2a7a2a;color:#fff;text-align:center;padding:8px 16px;flex-shrink:0}
header h1{font-size:clamp(1rem,3.5vw,1.8rem);font-weight:bold}
#sub{font-size:clamp(.75rem,2vw,1rem);color:#d0f0d0;margin-top:2px;font-weight:bold}
#rel{font-size:clamp(.6rem,1.5vw,.85rem);color:#aee8ae;margin-top:1px}
#area{flex:1;overflow:hidden;position:relative}
iframe{position:absolute;left:0;top:0;border:none;transform-origin:top left}
#rodape{background:#2a7a2a;text-align:center;padding:6px;display:flex;align-items:center;justify-content:center;height:120px;flex-shrink:0}
#rodape img{height:110px;max-width:100%;object-fit:contain}
footer{background:#2a7a2a;border-top:1px solid #1a5a1a;text-align:center;padding:4px;font-size:clamp(.55rem,1.4vw,.75rem);color:#aee8ae;flex-shrink:0}
footer b{color:#fff}
</style>
</head>
<body>
<header>
<h1>🎯 DEU NO POSTE — SÃO PAULO</h1>
<div id="sub">Carregando...</div>
<div id="rel">--:--:--</div>
</header>
<div id="area"><iframe id="fr" scrolling="no" src=""></iframe></div>
<div id="rodape"><img src="logo divulga mix.png" alt="Divulga Mix"></div>
